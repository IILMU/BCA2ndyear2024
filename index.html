<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Salary Predictor</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <div class="card">

        <h1>💼 AI Salary Predictor</h1>
        <p class="subtitle">Predict your future earnings with AI precision</p>

        <form method="POST">

            <div class="input-group">
                <label>Years of Experience</label>

                <input type="range" name="exp" min="0" max="10" step="0.5" value="1"
                       oninput="updateValue(this.value)">

                <div class="range-value">
                    <span id="expValue">1</span> Years Experience
                </div>
            </div>

            <button type="submit">🚀 Predict Now</button>

        </form>

        {% if prediction %}
        <div class="result-box">
            <p>Estimated Salary</p>
            <h2>₹ {{ "{:,.0f}".format(prediction) }}</h2>
        </div>
        {% endif %}

    </div>

</div>

<script>
function updateValue(val) {
    document.getElementById("expValue").innerText = val;
}
</script>

</body>
</html>
